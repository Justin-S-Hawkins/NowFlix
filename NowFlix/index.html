<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC&family=Anton&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/navbar.css" />
    <link rel="stylesheet" href="CSS/browse.css" />
    <link rel="stylesheet" href="CSS/base.css" />
    <link rel="stylesheet" href="CSS/hero.css" />
    <link rel="stylesheet" href="CSS/overviewModal.css" />
    <title>NowFlix</title>
  </head>
  <body>
    <!-- HEADER / NAVBAR -->
    <header>
      <div class="overlay"></div>
      <nav>
        <div class="nav-left">
          <div class="logo">NowFlix</div>
          <div class="browse-container">
            <div class="browse-btn-container">
              <button class="btn browse-btn">Browse</button>
              <i class="chevron-indicator fa-solid fa-chevron-down"></i>
            </div>

            <div class="browse-dropdown">
              <div class="browse-dropdown-left">
                <div class="tabs">
                  <button class="btn genres">genres</button
                  ><i class="fa-solid fa-chevron-right"></i>
                </div>
                <div class="tabs">
                  <button class="btn collections">Collections</button
                  ><i class="fa-solid fa-chevron-right"></i>
                </div>
              </div>

              <div class="browse-dropdown-right">
                <ul class="tabs-list"></ul>
              </div>
            </div>
          </div>

          <button class="btn">Movies</button>
          <button class="btn tv-shows">TV Shows</button>
        </div>
        <div class="nav-right">
          <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              id="search"
              type="search"
              placeholder="Find Movies, TV Shows and More."
              autocomplete="off"
            />
          </div>
          <button class="btn register-btn">Register</button>
          <button class="btn sign-in-btn">Sign In</button>
          <button class="btn help-btn">?</button>
        </div>
      </nav>
    </header>

    <!-- HERO BACKDROP SECTION -->
    <section id="hero-container">
      <div class="arrows">
        <i class="fa-solid fa-circle-chevron-left hero-arrow-left"></i>
        <i class="fa-solid fa-circle-chevron-right hero-arrow-right"></i>
      </div>
      <div class="hero-backdrop">
        <ul class="hero-backdrop-list"></ul>
        <div class="dots-container"></div>
      </div>
    </section>

    <!-- MOVIE OVERVIEW SECTION-->
    <section class="overview-container">
      <i class="fa-solid fa-xmark close-modal"></i>
      <div class="movie-overview">
        <div class="movie-poster"></div>
        <div class="like-container">
          <div class="like overview-btns">
            <i class="fa-regular fa-thumbs-up"></i>
          </div>
          <div class="dislike overview-btns">
            <i class="fa-regular fa-thumbs-down"></i>
          </div>
        </div>
        <div class="add-to-my-list overview-btns">Add to My List</div>
        <div class="share-container">
          <div class="share overview-btns">Share</div>
          <div class="report-problem overview-btns">
            <i class="fa-solid fa-ellipsis"></i>
          </div>
        </div>
      </div>

      <div class="movie-info-overview">
        <h2 class="overview-title"></h2>
        <div class="movie-info-linear">
          <span class="overview-year"></span>
          <span class="overview-dur"></span>
          <span class="overview-cc">
            <i class="fa-solid fa-closed-captioning"></i
          ></span>
          <span class="overview-content-rating"></span>
        </div>
        <div class="description-container">
          <div class="movie-description"></div>
          <div class="language"></div>
          <div class="starring"></div>
          <div class="directed-by"></div>
          <hr />
        </div>
      </div>
    </section>

    <script
      src="https://kit.fontawesome.com/a3b6dc3996.js"
      crossorigin="anonymous"
    ></script>
    <!-- <script src="nav.js"></script> -->
    <script type="module" src="JS/main.js"></script>
  </body>
</html>
